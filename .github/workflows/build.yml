name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            pkg_target: node22-linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            pkg_target: node22-win-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            pkg_target: node22-macos-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev \
            libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build sidecar binary
        run: |
          npm run build --workspace=sidecar
          npx @yao-pkg/pkg sidecar/dist/index.cjs --targets ${{ matrix.pkg_target }} --output src-tauri/binaries/fera-crawler-${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Fera ${{ github.ref_name }}"
          releaseBody: "SEO Crawler release"
          releaseDraft: true
          prerelease: false
