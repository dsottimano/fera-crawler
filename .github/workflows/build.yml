name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build sidecar (tsc)
        run: npm run build --workspace=sidecar

      - name: Build sidecar launcher
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          rustc sidecar-launcher/main.rs -o src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc.exe

      - name: Download portable Node.js
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/node"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.14.0/win-x64/node.exe" -OutFile "src-tauri/node/node.exe"
          Write-Host "Downloaded node.exe ($([math]::Round((Get-Item 'src-tauri/node/node.exe').Length / 1MB, 1)) MB)"

      - name: Stage sidecar runtime
        shell: pwsh
        run: |
          $dest = "src-tauri/sidecar-bundle"
          New-Item -ItemType Directory -Force -Path $dest

          # Copy compiled JS files
          Copy-Item "sidecar/dist/*.js" "$dest/"

          # Install production dependencies for the sidecar
          $pkg = @{
            name = "fera-sidecar-runtime"
            version = "0.1.0"
            private = $true
            type = "module"
            dependencies = @{
              crawlee = "^3.12.3"
              "@crawlee/playwright" = "^3.12.3"
              playwright = "^1.50.0"
            }
          }
          $pkg | ConvertTo-Json -Depth 5 | Set-Content "$dest/package.json"
          npm install --prefix $dest --omit=dev
          Write-Host "Sidecar runtime: $((Get-ChildItem $dest -Recurse -File).Count) files"

      - name: Copy Chromium and patch tauri.conf.json
        shell: pwsh
        run: |
          $exePath = node -e "console.log(require('playwright').chromium.executablePath())"
          $chromiumDir = Split-Path $exePath -Parent

          # Copy Chromium into src-tauri
          $dest = "src-tauri/chromium"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Recurse -Force "$chromiumDir\*" "$dest\"
          Write-Host "Copied $((Get-ChildItem $dest -Recurse -File).Count) Chromium files"

          # Collect ALL resource files: chromium + node + sidecar-bundle
          $files = @()
          foreach ($dir in @("src-tauri/chromium", "src-tauri/node", "src-tauri/sidecar-bundle")) {
            if (Test-Path $dir) {
              Get-ChildItem $dir -Recurse -File | ForEach-Object {
                $rel = $_.FullName.Replace("$PWD\src-tauri\", "").Replace("\", "/")
                $files += $rel
              }
            }
          }
          Write-Host "Total resource entries: $($files.Count)"

          # Patch tauri.conf.json
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue @($files) -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json" -Encoding UTF8

      - name: Smoke test sidecar
        shell: pwsh
        continue-on-error: true
        run: |
          $sidecar = "src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc.exe"
          Write-Host "=== Sidecar: $sidecar ==="
          Write-Host "Size: $([math]::Round((Get-Item $sidecar).Length / 1KB, 1)) KB"

          Write-Host "`n=== Running smoke test ==="
          $proc = Start-Process -FilePath $sidecar `
            -ArgumentList "crawl","https://example.com","--max-requests","1","--concurrency","1" `
            -NoNewWindow -PassThru `
            -RedirectStandardOutput "smoke-stdout.txt" `
            -RedirectStandardError "smoke-stderr.txt"
          if (-not $proc.WaitForExit(60000)) {
            Write-Host "TIMEOUT after 60s — killing process"
            $proc.Kill()
          }
          Write-Host "`nExit code: $($proc.ExitCode)"
          Write-Host "`n=== STDOUT ==="
          if (Test-Path smoke-stdout.txt) { Get-Content smoke-stdout.txt }
          Write-Host "`n=== STDERR ==="
          if (Test-Path smoke-stderr.txt) { Get-Content smoke-stderr.txt }

      - name: Build Tauri app
        run: npx tauri build
        env:
          CI: true

      - name: Upload installer to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Write-Host "Found installer: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 1)) MB)"
          $tag = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME } else { "main" }
          gh release create $tag --draft --title "Fera $tag" --notes "SEO Crawler release" 2>$null
          gh release upload $tag $exe.FullName --clobber
