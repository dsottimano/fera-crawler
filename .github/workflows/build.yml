name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Bundle Chromium into resources
        shell: pwsh
        run: |
          $exePath = node -e "console.log(require('playwright').chromium.executablePath())"
          $chromiumDir = Split-Path $exePath -Parent
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/chromium"
          Copy-Item -Recurse -Force "$chromiumDir\*" "src-tauri/resources/chromium/"
          Write-Host "Bundled Chromium from $chromiumDir"
          Get-ChildItem "src-tauri/resources/chromium" -Recurse -File | Measure-Object | Select-Object Count
          Get-ChildItem "src-tauri/resources/chromium/chrome.exe" -ErrorAction SilentlyContinue | Select-Object FullName, Length
          if (-not (Test-Path "src-tauri/resources/chromium/chrome.exe")) { Write-Error "chrome.exe not found!"; exit 1 }

      - name: Build sidecar binary
        run: |
          npm run build --workspace=sidecar
          npx @yao-pkg/pkg sidecar/dist/index.cjs --targets node22-win-x64 --output src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Fera ${{ github.ref_name }}"
          releaseBody: "SEO Crawler release"
          releaseDraft: true
          prerelease: false
