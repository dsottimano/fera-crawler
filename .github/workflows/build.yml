name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build sidecar binary
        run: |
          npm run build --workspace=sidecar
          npx @yao-pkg/pkg sidecar/dist/index.cjs --targets node22-win-x64 --output src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc

      - name: Build Tauri app
        run: npx tauri build
        env:
          CI: true

      - name: Create portable distribution with Chromium
        shell: pwsh
        run: |
          $exePath = node -e "console.log(require('playwright').chromium.executablePath())"
          $chromiumSrc = Split-Path $exePath -Parent

          # Create distribution directory
          $dist = "dist/Fera"
          New-Item -ItemType Directory -Force -Path $dist

          # Copy the main exe and sidecar from the release build
          Copy-Item "src-tauri/target/release/fera.exe" "$dist/Fera.exe"
          Copy-Item "src-tauri/target/release/fera-crawler-x86_64-pc-windows-msvc.exe" "$dist/fera-crawler.exe"

          # Copy Chromium
          $chromiumDest = "$dist/chromium"
          New-Item -ItemType Directory -Force -Path $chromiumDest
          Copy-Item -Recurse -Force "$chromiumSrc\*" "$chromiumDest\"

          # Copy WebView2Loader if present
          Get-ChildItem "src-tauri/target/release/WebView2Loader.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $dist

          Write-Host "Distribution contents:"
          Get-ChildItem $dist | Format-Table Name, Length
          Write-Host "Chromium files: $((Get-ChildItem $chromiumDest -Recurse -File).Count)"

          # Create zip
          Compress-Archive -Path "$dist\*" -DestinationPath "dist/Fera-portable-x64.zip" -Force
          $zipSize = [math]::Round((Get-Item "dist/Fera-portable-x64.zip").Length / 1MB, 1)
          Write-Host "Created Fera-portable-x64.zip ($zipSize MB)"

      - name: Upload to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME } else { "main" }
          gh release create $tag --draft --title "Fera $tag" --notes "SEO Crawler release — portable zip, no install needed" 2>$null
          gh release upload $tag "dist/Fera-portable-x64.zip" --clobber
          # Also upload the NSIS installer if it exists
          $nsis = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) { gh release upload $tag $nsis.FullName --clobber }
