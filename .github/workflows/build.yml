name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build sidecar binary
        run: bun build --compile --external chromium-bidi --external electron sidecar/src/index.ts --outfile src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc

      - name: Copy Chromium and patch tauri.conf.json
        shell: pwsh
        run: |
          $exePath = node -e "console.log(require('playwright').chromium.executablePath())"
          $chromiumDir = Split-Path $exePath -Parent

          # Copy Chromium into src-tauri
          $dest = "src-tauri/chromium"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Recurse -Force "$chromiumDir\*" "$dest\"
          Write-Host "Copied $((Get-ChildItem $dest -Recurse -File).Count) Chromium files"

          # Build resource list: every file in chromium/ as explicit paths
          $files = Get-ChildItem "$dest" -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Replace("$PWD\src-tauri\", "").Replace("\", "/")
            $rel
          }
          Write-Host "Resource entries: $($files.Count)"

          # Patch tauri.conf.json to add resources array
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue @($files) -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json" -Encoding UTF8
          Write-Host "Patched tauri.conf.json with $($files.Count) resource files"

      - name: Smoke test sidecar
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "=== Sidecar exe ==="
          $sidecar = "src-tauri/binaries/fera-crawler-x86_64-pc-windows-msvc.exe"
          if (Test-Path $sidecar) {
            Write-Host "Found: $sidecar ($([math]::Round((Get-Item $sidecar).Length / 1MB, 1)) MB)"
          } else {
            Write-Host "NOT FOUND: $sidecar"; exit 1
          }

          Write-Host "`n=== Chromium check ==="
          $chromePath = "src-tauri/chromium/chrome.exe"
          if (Test-Path $chromePath) { Write-Host "Found chrome.exe" }
          else { Write-Host "chrome.exe NOT FOUND" }
          Get-ChildItem "src-tauri/chromium" -Depth 0 | ForEach-Object { Write-Host "  $_" }

          Write-Host "`n=== Sidecar search paths (relative to exe) ==="
          $exeDir = Split-Path $sidecar -Parent
          Write-Host "  1: $exeDir/chromium/chrome.exe  -> $(Test-Path "$exeDir/chromium/chrome.exe")"
          Write-Host "  2: $exeDir/resources/chromium/chrome.exe  -> $(Test-Path "$exeDir/resources/chromium/chrome.exe")"
          $parentDir = Split-Path $exeDir -Parent
          Write-Host "  3: $parentDir/chromium/chrome.exe  -> $(Test-Path "$parentDir/chromium/chrome.exe")"

          Write-Host "`n=== Running: $sidecar crawl https://example.com --max-requests 1 ==="
          $env:DEBUG = "pw:browser*"
          $proc = Start-Process -FilePath $sidecar `
            -ArgumentList "crawl","https://example.com","--max-requests","1","--concurrency","1" `
            -NoNewWindow -PassThru `
            -RedirectStandardOutput "smoke-stdout.txt" `
            -RedirectStandardError "smoke-stderr.txt"
          if (-not $proc.WaitForExit(120000)) {
            Write-Host "TIMEOUT after 120s — killing process"
            $proc.Kill()
          }
          Write-Host "`nExit code: $($proc.ExitCode)"
          Write-Host "`n=== STDOUT ==="
          if (Test-Path smoke-stdout.txt) { Get-Content smoke-stdout.txt }
          Write-Host "`n=== STDERR ==="
          if (Test-Path smoke-stderr.txt) { Get-Content smoke-stderr.txt }

      - name: Build Tauri app
        run: npx tauri build
        env:
          CI: true

      - name: Upload installer to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Write-Host "Found installer: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 1)) MB)"
          $tag = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME } else { "main" }
          gh release create $tag --draft --title "Fera $tag" --notes "SEO Crawler release" 2>$null
          gh release upload $tag $exe.FullName --clobber
